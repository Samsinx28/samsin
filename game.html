<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smash Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.18.0/build/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}

#shell{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;
  padding:5px 8px 4px;gap:4px;
}

/* HUD */
#hud{
  width:100%;max-width:900px;flex-shrink:0;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:4px;
}
.hud-left{display:flex;flex-direction:column;align-items:flex-start;}
.hud-center{text-align:center;}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;}

.brand{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(.85rem,2.4vw,1.55rem);font-weight:900;letter-spacing:.12em;
  color:#00f0ff;text-shadow:0 0 18px rgba(0,240,255,.5),0 0 40px rgba(0,240,255,.18);
  
  line-height:1;white-space:nowrap;
}
.brand-sub{font-size:clamp(.42rem,.85vw,.58rem);letter-spacing:.22em;color:rgba(0,240,255,.38);text-transform:uppercase;margin-top:1px;}

.stat-label{font-size:clamp(.38rem,.75vw,.52rem);letter-spacing:.24em;color:rgba(0,240,255,.3);text-transform:uppercase;}
.stat-value{font-family:'Orbitron',sans-serif;font-size:clamp(.8rem,1.9vw,1.35rem);font-weight:700;line-height:1.1;color:#00f0ff;}
#score-val{color:#00f0ff;}
#level-val{color:#00f0ff;}


/* Timer bar */
#timer-wrap{width:100%;max-width:900px;flex-shrink:0;height:3px;border-radius:2px;background:rgba(0,240,255,.08);overflow:hidden;}
#timer-bar{height:100%;width:100%;background:#00f0ff;box-shadow:0 0 8px rgba(0,240,255,.5);transition:width .28s linear,background .5s;}
#timer-bar.urgent{background:#ff2244;box-shadow:0 0 10px rgba(255,34,68,.6);animation:pulse-bar .5s ease-in-out infinite alternate;}
@keyframes pulse-bar{to{opacity:.6;}}

/* Game frame */
#game-wrap{
  width:100%;max-width:900px;flex:1;min-height:0;
  position:relative;border-radius:10px;
  padding:1px;
  background:rgba(0,240,255,.28);
  box-shadow:0 0 22px rgba(0,240,255,.1);
}

#game-container{
  position:relative;width:100%;height:100%;
  border-radius:9px;overflow:hidden;background:#000;
}
#game-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
.input_video{display:none;}

/* Corner deco */
.corner{position:absolute;width:13px;height:13px;z-index:5;pointer-events:none;}
.corner.tl{top:5px;left:5px;border-top:1.5px solid #00f0ff;border-left:1.5px solid #00f0ff;}
.corner.tr{top:5px;right:5px;border-top:1.5px solid #00f0ff;border-right:1.5px solid #00f0ff;}
.corner.bl{bottom:5px;left:5px;border-bottom:1.5px solid #00f0ff;border-left:1.5px solid #00f0ff;}
.corner.br{bottom:5px;right:5px;border-bottom:1.5px solid #00f0ff;border-right:1.5px solid #00f0ff;}

/* Overlay */
#overlay{
  position:absolute;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
  transition:opacity .5s ease;
}
#overlay.hidden{opacity:0;pointer-events:none;}
.overlay-box{
  border:1px solid rgba(0,240,255,.22);border-radius:10px;
  padding:clamp(14px,3.5vw,34px) clamp(18px,5.5vw,48px);
  background:rgba(0,240,255,.02);text-align:center;
  max-width:90%;
}
.spin-ring{
  width:38px;height:38px;border-radius:50%;margin:0 auto 10px;
  border:2.5px solid rgba(0,245,255,.15);border-top-color:#00f5ff;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#overlay-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.1rem,3.5vw,2rem);font-weight:900;letter-spacing:.1em;
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);background-size:200% auto;
  
  animation:shimmer 1.8s linear infinite;display:none;margin-bottom:8px;
}
@keyframes shimmer{to{background-position:200% center;}}
#overlay-msg{
  font-family:'Orbitron',sans-serif;font-size:clamp(.6rem,1.4vw,.82rem);
  color:rgba(0,240,255,.88);letter-spacing:.1em;
}
#overlay-sub{font-size:clamp(.5rem,1.1vw,.65rem);color:rgba(255,255,255,.32);margin-top:5px;letter-spacing:.14em;}

/* Footer */
#footer{flex-shrink:0;display:flex;align-items:center;gap:10px;}
#reset-btn{
  font-family:'Orbitron',sans-serif;font-size:clamp(.5rem,1.1vw,.68rem);
  font-weight:700;letter-spacing:.17em;text-transform:uppercase;
  color:#000;background:#00f0ff;
  border:none;padding:clamp(6px,1.3vw,9px) clamp(12px,2.8vw,22px);
  border-radius:5px;cursor:pointer;
  box-shadow:0 0 16px rgba(0,240,255,.4);
  transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent;
}
#reset-btn:hover,#reset-btn:active{transform:scale(.97);box-shadow:0 0 28px #00f0ff;}
.credit{font-size:clamp(.38rem,.72vw,.52rem);letter-spacing:.2em;color:rgba(255,255,255,.16);text-transform:uppercase;}

/* Floating score pop */
.fpop{
  position:absolute;pointer-events:none;z-index:30;
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(.8rem,2.2vw,1.3rem);
  animation:floatUp .85s ease forwards;
  text-shadow:0 0 12px currentColor;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-65px) scale(1.35);}}

#hud-status{
  position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
  font-size:clamp(.35rem,.65vw,.5rem);letter-spacing:.22em;text-transform:uppercase;
  color:rgba(0,240,255,.28);z-index:5;pointer-events:none;white-space:nowrap;
}

/* Score pop anim */
@keyframes scPop{0%{transform:scale(1)}45%{transform:scale(1.5)}100%{transform:scale(1)}}
.sc-pop{animation:scPop .28s ease;}
</style>
</head>
<body>
<div id="shell">

  <div id="hud">
    <div class="hud-left">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="level-val">1</div>
    </div>
    <div class="hud-center">
      <div class="brand">SMASH LAB</div>
      <div class="brand-sub">Pinch · Throw · Destroy</div>
    </div>
    <div class="hud-right">
      <div class="stat-label">Targets</div>
      <div class="stat-value" id="score-val">0 / 5</div>
    </div>
  </div>

  <div id="timer-wrap"><div id="timer-bar"></div></div>

  <div id="game-wrap">
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <video class="input_video"></video>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="hud-status">HAND TRACKING ACTIVE</div>
      <div id="overlay">
        <div class="overlay-box">
          <div class="spin-ring" id="spin-ring"></div>
          <div id="overlay-title">VICTORY</div>
          <div id="overlay-msg">Initializing…</div>
          <div id="overlay-sub"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer">
    <button id="reset-btn">↺ New Game</button>
    <span class="credit">by sangam</span>
  </div>
</div>

<script type="module">
// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}
function tone(type, f0, f1, dur, vol, delay=0) {
  if (!actx) return;
  const t = actx.currentTime + delay;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(f1, t+dur);
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+.02);
}
function noise(dur, freq, q, vol, delay=0) {
  if (!actx) return;
  const t = actx.currentTime + delay;
  const n = actx.sampleRate * dur;
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i]=Math.random()*2-1;
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=q;
  const g = actx.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.connect(bp); bp.connect(g); g.connect(actx.destination); src.start(t);
}
function playGrab()    { tone('sine',600,900,.1,.13); }
function playThrow()   { tone('sawtooth',280,60,.18,.17); }
function playHit()     { tone('sine',110,25,.38,.55); noise(.22,1100,.9,.4); }
function playCollide() { noise(.05,800,.5,.09); }
function playWin()     { [523,659,784,1046].forEach((f,i)=>tone('triangle',f,f,.35,.2,i*.13)); }
function playTick()    { tone('sine',440,440,.04,.05); }

// ═══════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════
const video     = document.querySelector('.input_video');
const canvas    = document.getElementById('game-canvas');
const ctx       = canvas.getContext('2d', { alpha:false });
const gameCont  = document.getElementById('game-container');
const overlay   = document.getElementById('overlay');
const ovTitle   = document.getElementById('overlay-title');
const ovMsg     = document.getElementById('overlay-msg');
const ovSub     = document.getElementById('overlay-sub');
const spinRing  = document.getElementById('spin-ring');
const resetBtn  = document.getElementById('reset-btn');
const scoreEl   = document.getElementById('score-val');
const hudStatus = document.getElementById('hud-status');
const timerBar  = document.getElementById('timer-bar');
const levelEl   = document.getElementById('level-val');

// ═══════════════════════════════════════════════
// MATTER
// ═══════════════════════════════════════════════
const { Engine, Events, Runner, World, Bodies, Body, Composite, Constraint, Query } = Matter;
let engine, runner;

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
const TOTAL    = 5;
const TIMELIMIT= 30;
let score=0, timeLeft=TIMELIMIT;
let currentLevel=1;
let timerInterval=null, timerRunning=false, gameActive=false;

const objects=[], targets=[], particles=[], shockwaves=[], trails=[];

// ═══════════════════════════════════════════════
// HAND STATE (logic preserved exactly)
// ═══════════════════════════════════════════════
let rawLM=null, smoothLM=null;
const SMOOTH=.4;
let isGrabbing=false, canRelease=false, canThrow=false;
let grabbedBody=null, grabConstraint=null;
const velBuf=[]; const VEL=5;
let handVel={x:0,y:0};
const THROW_MULT=4.5, GRAB_THRESH=.05, MIN_HOLD=1000, MIN_THROW=1000;
const HAND_LOSS=300, HAND_VIS=2000;
let handLossTO=null, handVisTO=null, prevGrab=null;

// ═══════════════════════════════════════════════
// BACKGROUND — fully pre-baked, just drawImage + stars
// ═══════════════════════════════════════════════
let staticBg=null, stars=[], bgTime=0, starTick=0;

function bakeBg(W,H) {
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const cx=c.getContext('2d');
  // Base — pure black
  cx.fillStyle='#000'; cx.fillRect(0,0,W,H);
  // Cyan nebula
  [{x:W*.15,y:H*.2,r:W*.32,c:'rgba(0,200,255,.04)'},{x:W*.85,y:H*.75,r:W*.26,c:'rgba(0,180,255,.035)'},
   {x:W*.5,y:H*.5,r:W*.4,c:'rgba(0,100,200,.025)'}
  ].forEach(b=>{
    const ng=cx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    ng.addColorStop(0,b.c); ng.addColorStop(1,'transparent');
    cx.fillStyle=ng; cx.beginPath(); cx.arc(b.x,b.y,b.r,0,Math.PI*2); cx.fill();
  });
  // Perspective grid (converging lines)
  const vx=W*.5, vy=H*.5;
  cx.strokeStyle='rgba(0,240,255,.03)'; cx.lineWidth=.6;
  cx.beginPath();
  for(let r=0;r<=14;r++){const y=H*r/14;cx.moveTo(0,y);cx.lineTo(W,y);}
  for(let c2=0;c2<=18;c2++){const x=W*c2/18;cx.moveTo(vx,vy);cx.lineTo(x,H);cx.moveTo(vx,vy);cx.lineTo(x,0);}
  cx.stroke();
  // Static dim stars
  cx.fillStyle='rgba(0,240,255,.18)';
  for(let i=0;i<55;i++){const sx=Math.random()*W,sy=Math.random()*H,sr=Math.random()*.75+.2;cx.beginPath();cx.arc(sx,sy,sr,0,Math.PI*2);cx.fill();}
  return c;
}

function initBg() {
  const W=canvas.width, H=canvas.height;
  staticBg=bakeBg(W,H);
  stars=[];
  for(let i=0;i<32;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.85+.25,phase:Math.random()*Math.PI*2,spd:Math.random()*.038+.012});
}

function drawBg() {
  bgTime+=.016; starTick++;
  ctx.drawImage(staticBg,0,0);
  if(starTick%2===0){
    stars.forEach(s=>{
      const a=.08+.42*(0.5+0.5*Math.sin(bgTime*s.spd*60+s.phase));
      ctx.fillStyle=`rgba(0,240,255,${a.toFixed(2)})`;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    });
  }
}

// ═══════════════════════════════════════════════
// SETUP / RESET
// ═══════════════════════════════════════════════
let gameLoopRunning=false;

function setup() {
  canvas.width  = gameCont.clientWidth  || 640;
  canvas.height = gameCont.clientHeight || 360;
  initBg();
  if(engine){World.clear(engine.world);Engine.clear(engine);}
  if(runner) Runner.stop(runner);
  engine=Engine.create({gravity:{y:1}});
  runner=Runner.create();
  const W=canvas.width, H=canvas.height, wt=80;
  World.add(engine.world,[
    Bodies.rectangle(W/2,H+wt/2,W*3,wt,{isStatic:true,label:'wall'}),
    Bodies.rectangle(-wt/2,H/2,wt,H*3,{isStatic:true,label:'wall'}),
    Bodies.rectangle(W+wt/2,H/2,wt,H*3,{isStatic:true,label:'wall'}),
    Bodies.rectangle(W/2,-wt/2,W*3,wt,{isStatic:true,label:'wall'}),
  ]);
  setupCollisions();
  resetGame();
  if(!gameLoopRunning){gameLoopRunning=true;gameLoop();}
}

function resetGame() {
  objects.forEach(b=>World.remove(engine.world,b));
  targets.forEach(b=>World.remove(engine.world,b));
  objects.length=0;targets.length=0;particles.length=0;shockwaves.length=0;trails.length=0;
  if(grabConstraint){World.remove(engine.world,grabConstraint);grabConstraint=null;}
  grabbedBody=null;isGrabbing=false;canRelease=false;canThrow=false;
  score=0;timeLeft=TIMELIMIT;timerRunning=false;
  clearInterval(timerInterval);
  gameActive=true;
  updateHUD(); updateTimerBar();
  if(levelEl) levelEl.textContent=currentLevel;
  spawnObjects(); spawnTargets();
  // Invalidate sprite cache on reset (in case canvas size changed)
  Object.keys(spriteCache).forEach(k=>delete spriteCache[k]);
  targetSprite=null;
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer(){
  if(timerRunning) return; timerRunning=true;
  timerInterval=setInterval(()=>{
    if(!gameActive) return;
    timeLeft=Math.max(0,timeLeft-1);
    updateTimerBar();
    if(timeLeft<=5) playTick();
    if(timeLeft===0){clearInterval(timerInterval);showTimeUp();}
  },1000);
}
function updateTimerBar(){
  timerBar.style.width=(timeLeft/TIMELIMIT*100)+'%';
  timerBar.classList.toggle('urgent',timeLeft<8);
}
function showTimeUp(){
  gameActive=false;
  ovTitle.style.display='none'; spinRing.style.display='none';
  ovMsg.textContent=`TIME! ${score}/${TOTAL} targets hit`;
  ovSub.textContent='TAP NEW GAME TO TRY AGAIN';
  overlay.classList.remove('hidden');
}

// ═══════════════════════════════════════════════
// SPAWN — responsive sizing
// ═══════════════════════════════════════════════
function spawnObjects() {
  const W=canvas.width, H=canvas.height;
  const TYPES=['sphere','wood','spear','sword'];
  const count=Math.min(9,Math.max(4,Math.floor(W/85)));
  for(let i=0;i<count;i++){
    // Spawn clustered near bottom-center, throw upward with spread
    // This guarantees objects are visible immediately and definitely moving
    const x = W*0.2 + Math.random()*W*0.6;
    const y = H*0.85 + Math.random()*H*0.1;
    const type=TYPES[i%TYPES.length];
    let b;
    switch(type){
      case 'sphere':{const r=Math.round(W*.028);b=Bodies.circle(x,y,r,{restitution:.75,friction:.01,render:{objectType:'sphere',radius:r}});break;}
      case 'wood':  {const w=Math.round(W*.1),h=Math.round(H*.05);b=Bodies.rectangle(x,y,w,h,{restitution:.38,friction:.1,render:{objectType:'wood',width:w,height:h}});break;}
      case 'spear': {const w=Math.round(W*.15),h=Math.round(H*.02);b=Bodies.rectangle(x,y,w,h,{restitution:.18,friction:.05,render:{objectType:'spear',width:w,height:h}});break;}
      case 'sword': {const w=Math.round(W*.12),h=Math.round(H*.028);b=Bodies.rectangle(x,y,w,h,{restitution:.1,friction:.02,render:{objectType:'sword',width:w,height:h}});break;}
    }
    // Strong upward launch with horizontal spread — fills the play area
    const vx = (Math.random() - 0.5) * 16;
    const vy = -(Math.random() * 12 + 10);
    Body.setVelocity(b, {x: vx, y: vy});
    Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.2);
    objects.push(b); World.add(engine.world,b);
  }
}

function getLevelLayout(W,H,r){
  const pad=W*.07;
  const lvl=((currentLevel-1)%5)+1; // cycle every 5
  const speedBase=W*.0014*(1+Math.min(currentLevel-1,6)*.12); // speeds up each level
  const layouts={
    1:[
      {x:pad,y:H*.28,moving:false},
      {x:pad,y:H*.65,moving:false},
      {x:W-pad,y:H*.28,moving:false},
      {x:W-pad,y:H*.65,moving:false},
      {x:W/2,y:pad+r,moving:true,rng:W*.28},
    ],
    2:[
      {x:W*.2,y:H*.18,moving:false},
      {x:W*.5,y:H*.35,moving:true,rng:W*.2},
      {x:W*.8,y:H*.18,moving:false},
      {x:W*.25,y:H*.7,moving:false},
      {x:W*.75,y:H*.7,moving:true,rng:W*.22},
    ],
    3:[
      {x:W*.5,y:H*.13,moving:true,rng:W*.35},
      {x:W*.5,y:H*.42,moving:false},
      {x:W*.22,y:H*.56,moving:true,rng:W*.16},
      {x:W*.78,y:H*.56,moving:true,rng:W*.16},
      {x:W*.5,y:H*.74,moving:false},
    ],
    4:[
      {x:W*.12,y:H*.2,moving:true,rng:W*.14,fast:true},
      {x:W*.88,y:H*.2,moving:true,rng:W*.14,fast:true},
      {x:W*.5,y:H*.22,moving:false},
      {x:W*.28,y:H*.66,moving:true,rng:W*.24,fast:true},
      {x:W*.72,y:H*.66,moving:true,rng:W*.24,fast:true},
    ],
    5: Array.from({length:5},()=>({
      x:pad+Math.random()*(W-pad*2),
      y:H*.1+Math.random()*H*.68,
      moving:true,rng:W*(.15+Math.random()*.3),fast:Math.random()>.35
    })),
  };
  return (layouts[lvl]||layouts[1]).map(p=>({...p,rng:p.rng||W*.28,spd:speedBase*(p.fast?1.5:Math.random()*.4+.8)}));
}

function spawnTargets(){
  const W=canvas.width, H=canvas.height;
  const r=Math.round(W*.031);
  getLevelLayout(W,H,r).forEach(p=>{
    const b=Bodies.circle(p.x,p.y,r,{isStatic:true,isSensor:true,label:'target',
      render:{objectType:'target',radius:r,moving:p.moving,
        moveOrigin:p.x,moveRange:p.rng,
        movePhase:Math.random()*Math.PI*2,moveSpeed:p.spd}});
    targets.push(b); World.add(engine.world,b);
  });
}

// ═══════════════════════════════════════════════
// COLLISIONS
// ═══════════════════════════════════════════════
function setupCollisions(){
  Events.on(engine,'collisionStart',ev=>{
    ev.pairs.forEach(({bodyA,bodyB})=>{
      let tgt=null,other=null;
      if(bodyA.label==='target'&&objects.includes(bodyB)){tgt=bodyA;other=bodyB;}
      if(bodyB.label==='target'&&objects.includes(bodyA)){tgt=bodyB;other=bodyA;}
      if(tgt&&other.speed>2){destroyTarget(tgt);}
      else if(!tgt&&other&&other.speed>3){playCollide();}
    });
  });
}

function destroyTarget(tgt){
  const idx=targets.indexOf(tgt); if(idx===-1) return;
  const cx=tgt.position.x, cy=tgt.position.y;
  const isMoving=tgt.render.moving;

  // Particles — sparks + shards
  for(let i=0;i<36;i++){
    const angle=Math.PI*2*i/36+(Math.random()-.5)*.35;
    const spd=Math.random()*6.5+2;
    const col=i%3===0?[0,240,255]:i%3===1?[120,255,255]:[0,180,220];
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:Math.random()*4+1.5,a:1,life:.953,col});
  }
  shockwaves.push({x:cx,y:cy,r:4,a:1,spd:7});
  shockwaves.push({x:cx,y:cy,r:2,a:.65,spd:11});

  playHit();
  startTimer();
  spawnPop(cx,cy,isMoving?2:1);
  World.remove(engine.world,tgt);
  targets.splice(idx,1);
  score++; updateHUD();
  if(score===TOTAL) setTimeout(()=>showWin(),200);
}

function showWin(){
  gameActive=false; clearInterval(timerInterval); playWin();
  currentLevel++;
  spinRing.style.display='none'; ovTitle.style.display='block';
  ovTitle.textContent='LEVEL CLEAR';
  ovMsg.textContent=`All ${TOTAL} targets destroyed!`;
  ovSub.textContent=`Advancing to Level ${currentLevel}…`;
  overlay.classList.remove('hidden');
  // Auto-advance to next level
  setTimeout(()=>{
    overlay.classList.add('hidden');
    resetGame();
  }, 2200);
}

function updateHUD(){
  scoreEl.textContent=`${score} / ${TOTAL}`;
  scoreEl.classList.remove('sc-pop'); void scoreEl.offsetWidth; scoreEl.classList.add('sc-pop');
}

function spawnPop(x,y,bonus){
  const el=document.createElement('div'); el.className='fpop';
  el.textContent=bonus>1?'+2 ◉':'+1';
  el.style.left=(x/canvas.width*100)+'%';
  el.style.top=(y/canvas.height*100)+'%';
  el.style.color='#00f0ff';
  gameCont.appendChild(el);
  setTimeout(()=>el.remove(),850);
}

// ═══════════════════════════════════════════════
// HAND LOGIC (identical to original)
// ═══════════════════════════════════════════════
function lerp(a,b,t){return a+(b-a)*t;}

function onHandResults(r){
  rawLM=r.multiHandLandmarks?.[0]??null;
  if(rawLM){if(handLossTO){clearTimeout(handLossTO);handLossTO=null;}hudStatus.textContent='HAND TRACKING ACTIVE';hudStatus.style.color='rgba(0,245,255,.3)';}
  else{hudStatus.textContent='SCANNING…';hudStatus.style.color='rgba(255,150,0,.3)';}
}

function smoothHand(){
  if(rawLM){
    if(handVisTO){clearTimeout(handVisTO);handVisTO=null;}
    if(!smoothLM) smoothLM=JSON.parse(JSON.stringify(rawLM));
    else rawLM.forEach((lm,i)=>{smoothLM[i].x=lerp(smoothLM[i].x,lm.x,SMOOTH);smoothLM[i].y=lerp(smoothLM[i].y,lm.y,SMOOTH);});
  } else if(smoothLM&&!handVisTO){handVisTO=setTimeout(()=>{smoothLM=null;handVisTO=null;},HAND_VIS);}
}

function handleGrab(){
  if(!smoothLM){
    if(isGrabbing&&grabConstraint&&!handLossTO){
      handLossTO=setTimeout(()=>{
        World.remove(engine.world,grabConstraint);
        if(grabbedBody&&canThrow){Body.setVelocity(grabbedBody,handVel);playThrow();}
        grabConstraint=null;grabbedBody=null;isGrabbing=false;canThrow=false;canRelease=false;velBuf.length=0;handLossTO=null;
      },HAND_LOSS);
    }
    return;
  }
  const th=smoothLM[4],ix=smoothLM[8];
  const dist=Math.hypot(th.x-ix.x,th.y-ix.y);
  const gp={x:(1-(th.x+ix.x)*.5)*canvas.width,y:((th.y+ix.y)*.5)*canvas.height};

  velBuf.push({...gp});
  if(velBuf.length>VEL) velBuf.shift();
  if(velBuf.length>1){const f=velBuf[0],l=velBuf[velBuf.length-1];handVel.x=(l.x-f.x)/velBuf.length*THROW_MULT;handVel.y=(l.y-f.y)/velBuf.length*THROW_MULT;}

  if(dist<GRAB_THRESH&&!isGrabbing){
    const hit=Query.point(objects,gp);
    if(hit.length>0){
      const b=hit[0];isGrabbing=true;grabbedBody=b;canThrow=false;canRelease=false;velBuf.length=0;playGrab();
      setTimeout(()=>{if(isGrabbing&&grabbedBody===b)canRelease=true;},MIN_HOLD);
      setTimeout(()=>{if(isGrabbing&&grabbedBody===b)canThrow=true;},MIN_THROW);
      grabConstraint=Constraint.create({pointA:gp,bodyB:b,stiffness:.9,length:0,render:{visible:false}});
      World.add(engine.world,grabConstraint);
    }
  } else if(dist>=GRAB_THRESH&&isGrabbing&&canRelease){
    World.remove(engine.world,grabConstraint);
    if(grabbedBody&&canThrow){Body.setVelocity(grabbedBody,handVel);playThrow();}
    grabConstraint=null;grabbedBody=null;isGrabbing=false;canThrow=false;canRelease=false;velBuf.length=0;
  }
  if(isGrabbing&&grabConstraint){grabConstraint.pointA={...gp};Body.setAngularVelocity(grabbedBody,0);}

  if(prevGrab&&(Math.abs(gp.x-prevGrab.x)>1||Math.abs(gp.y-prevGrab.y)>1)){
    trails.push({x:gp.x,y:gp.y,r:Math.random()*2.2+.7,a:.5,col:dist<GRAB_THRESH?[0,240,255]:[0,180,200]});
  }
  prevGrab={...gp};
}

// ═══════════════════════════════════════════════
// HAND SKELETON CONNECTIONS
// ═══════════════════════════════════════════════
const HAND_CONN=[
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
];

// ═══════════════════════════════════════════════
// SPRITE CACHE (pre-baked per size)
// ═══════════════════════════════════════════════
const spriteCache={};
function getSprite(type,w,h){
  const key=`${type}_${w}_${h}`;
  if(spriteCache[key]) return spriteCache[key];
  const pad=16;
  const sc=document.createElement('canvas'); sc.width=w+pad; sc.height=h+pad;
  const sx=sc.getContext('2d');
  const ox=pad/2, oy=pad/2;
  switch(type){
    case 'sphere':{
      const r=w/2;
      const hl=sx.createRadialGradient(ox+r,oy+r,r*.4,ox+r,oy+r,r*1.9);
      hl.addColorStop(0,'rgba(0,200,255,.18)');hl.addColorStop(1,'transparent');
      sx.fillStyle=hl;sx.beginPath();sx.arc(ox+r,oy+r,r*1.9,0,Math.PI*2);sx.fill();
      const bg=sx.createRadialGradient(ox+r*.55,oy+r*.5,1,ox+r,oy+r,r);
      bg.addColorStop(0,'#90e8ff');bg.addColorStop(.5,'#1890b0');bg.addColorStop(1,'#073850');
      sx.fillStyle=bg;sx.beginPath();sx.arc(ox+r,oy+r,r,0,Math.PI*2);sx.fill();
      sx.strokeStyle='rgba(0,240,255,.4)';sx.lineWidth=1.5;sx.stroke();
      const sp=sx.createRadialGradient(ox+r*.52,oy+r*.42,0,ox+r*.52,oy+r*.42,r*.48);
      sp.addColorStop(0,'rgba(255,255,255,.52)');sp.addColorStop(1,'transparent');
      sx.fillStyle=sp;sx.beginPath();sx.arc(ox+r*.52,oy+r*.42,r*.48,0,Math.PI*2);sx.fill();
      break;
    }
    case 'wood':{
      sx.fillStyle='rgba(0,0,0,.3)';sx.fillRect(ox+4,oy+4,w,h);
      const wg=sx.createLinearGradient(ox,oy,ox,oy+h);
      wg.addColorStop(0,'#486870');wg.addColorStop(.5,'#2a4850');wg.addColorStop(1,'#122830');
      sx.fillStyle=wg;sx.fillRect(ox,oy,w,h);
      sx.strokeStyle='rgba(0,180,220,.18)';sx.lineWidth=1;
      for(let i=1;i<5;i++){const gy=oy+h*i/5;sx.beginPath();sx.moveTo(ox,gy);sx.bezierCurveTo(ox+w*.3,gy+2,ox+w*.7,gy-2,ox+w,gy);sx.stroke();}
      sx.strokeStyle='rgba(0,240,255,.3)';sx.lineWidth=1.5;sx.strokeRect(ox+1,oy+1,w-2,h-2);
      sx.strokeStyle='#001820';sx.lineWidth=2;sx.strokeRect(ox,oy,w,h);
      break;
    }
    case 'spear':{
      const tipLen=Math.round(w*.24);
      const sg=sx.createLinearGradient(ox,oy,ox,oy+h);
      sg.addColorStop(0,'#305868');sg.addColorStop(.5,'#1a3845');sg.addColorStop(1,'#0a1e28');
      sx.fillStyle=sg;sx.fillRect(ox,oy,w-tipLen,h);
      sx.strokeStyle='rgba(0,180,220,.2)';sx.lineWidth=1;
      sx.beginPath();for(let i=1;i<4;i++){const lx=ox+i*(w-tipLen)/4;sx.moveTo(lx,oy);sx.lineTo(lx,oy+h);}sx.stroke();
      const tg=sx.createLinearGradient(ox+w-tipLen,oy+h/2,ox+w,oy+h/2);
      tg.addColorStop(0,'#305868');tg.addColorStop(.4,'#00f0ff');tg.addColorStop(1,'#80e8ff');
      sx.fillStyle=tg;sx.beginPath();sx.moveTo(ox+w,oy+h/2);sx.lineTo(ox+w-tipLen,oy-4);sx.lineTo(ox+w-tipLen,oy+h+4);sx.closePath();sx.fill();
      sx.strokeStyle='rgba(0,240,255,.55)';sx.lineWidth=1.2;sx.stroke();
      break;
    }
    case 'sword':{
      const bl=Math.round(w*.73),gd=11;
      const bg2=sx.createLinearGradient(ox,oy,ox,oy+h);
      bg2.addColorStop(0,'#90e8ff');bg2.addColorStop(.3,'#2090b0');bg2.addColorStop(.5,'#80d8f0');bg2.addColorStop(.7,'#2090b0');bg2.addColorStop(1,'#90e8ff');
      sx.fillStyle=bg2;sx.fillRect(ox+gd,oy,bl,h);
      sx.beginPath();sx.moveTo(ox+gd+bl,oy);sx.lineTo(ox+w,oy+h/2);sx.lineTo(ox+gd+bl,oy+h);sx.closePath();sx.fill();
      sx.strokeStyle='rgba(0,200,255,.4)';sx.lineWidth=1.5;sx.beginPath();sx.moveTo(ox+gd+8,oy+h/2);sx.lineTo(ox+gd+bl*.78,oy+h/2);sx.stroke();
      sx.fillStyle='#005568';sx.fillRect(ox+3,oy-7,gd,h+14);sx.strokeStyle='#003040';sx.lineWidth=1;sx.strokeRect(ox+3,oy-7,gd,h+14);
      const hg=sx.createLinearGradient(ox,oy,ox,oy+h);hg.addColorStop(0,'#0a2838');hg.addColorStop(.5,'#1a4858');hg.addColorStop(1,'#0a2838');
      sx.fillStyle=hg;sx.fillRect(ox,oy+2,17,h-4);
      sx.strokeStyle='rgba(0,200,255,.45)';sx.lineWidth=1.2;
      for(let i=0;i<4;i++){sx.beginPath();sx.moveTo(ox+2+i*3.5,oy+2);sx.lineTo(ox+2+i*3.5,oy+h-2);sx.stroke();}
      break;
    }
  }
  spriteCache[key]=sc;
  return sc;
}

// ═══════════════════════════════════════════════
// TARGET SPRITE (pre-baked at current size)
// ═══════════════════════════════════════════════
let targetSprite=null, targetSpriteR=0;
function getTargetSprite(r){
  if(targetSprite&&targetSpriteR===r) return targetSprite;
  targetSpriteR=r;
  const sz=Math.round(r*4.5)+6;
  const sc=document.createElement('canvas'); sc.width=sz;sc.height=sz;
  const sx=sc.getContext('2d'), cx=sz/2, cy=sz/2;
  const gl=sx.createRadialGradient(cx,cy,r*.4,cx,cy,r*2.2);
  gl.addColorStop(0,'rgba(0,240,255,.22)');gl.addColorStop(.55,'rgba(0,200,255,.07)');gl.addColorStop(1,'transparent');
  sx.fillStyle=gl;sx.beginPath();sx.arc(cx,cy,r*2.2,0,Math.PI*2);sx.fill();
  const bg=sx.createRadialGradient(cx-r*.3,cy-r*.3,r*.08,cx,cy,r);
  bg.addColorStop(0,'#a0ffff');bg.addColorStop(.45,'#00d0e8');bg.addColorStop(1,'#003850');
  sx.fillStyle=bg;sx.beginPath();sx.arc(cx,cy,r,0,Math.PI*2);sx.fill();
  sx.strokeStyle='rgba(0,240,255,.55)';sx.lineWidth=1.5;sx.beginPath();sx.arc(cx,cy,r*.55,0,Math.PI*2);sx.stroke();
  sx.fillStyle='rgba(255,255,255,.78)';sx.beginPath();sx.arc(cx,cy,r*.14,0,Math.PI*2);sx.fill();
  const sp=sx.createRadialGradient(cx-r*.25,cy-r*.28,0,cx-r*.25,cy-r*.28,r*.44);
  sp.addColorStop(0,'rgba(255,255,255,.42)');sp.addColorStop(1,'transparent');
  sx.fillStyle=sp;sx.beginPath();sx.arc(cx-r*.25,cy-r*.28,r*.44,0,Math.PI*2);sx.fill();
  targetSprite=sc;
  return sc;
}

// ═══════════════════════════════════════════════
// MOVING TARGETS UPDATE
// ═══════════════════════════════════════════════
function updateMovingTargets(){
  targets.forEach(t=>{
    if(!t.render.moving) return;
    const r=t.render;
    r.movePhase+=r.moveSpeed;
    Body.setPosition(t,{x:r.moveOrigin+Math.sin(r.movePhase)*r.moveRange,y:t.position.y});
  });
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
let tPulse=0;

function renderObjects(){
  objects.forEach(b=>{
    const {position:pos,angle,render:r}=b;
    const w=r.width||r.radius*2, h=r.height||r.radius*2;
    // Only skip if entirely off the bottom (fallen out)
    if(pos.y - h > canvas.height + 20) return;
    const sp=getSprite(r.objectType,w,h);
    ctx.save();ctx.translate(pos.x,pos.y);ctx.rotate(angle);
    ctx.drawImage(sp,-sp.width/2,-sp.height/2);
    ctx.restore();
  });
}

function renderTargets(){
  tPulse+=.05;
  targets.forEach((t,i)=>{
    const pos=t.position, r=t.render.radius;
    const pulse=1+Math.sin(tPulse+i*1.4)*.07;
    const rp=r*pulse;
    const sp=getTargetSprite(r);
    const sz=sp.width;
    ctx.drawImage(sp,pos.x-sz/2,pos.y-sz/2);
    // Scan arm
    ctx.save();ctx.translate(pos.x,pos.y);ctx.rotate(tPulse*1.2+i*1.4);
    ctx.strokeStyle=t.render.moving?'rgba(0,240,255,.6)':'rgba(0,200,220,.3)';
    ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(rp,0);ctx.stroke();
    ctx.restore();
    // Moving target: dashed ring marker
    if(t.render.moving){
      ctx.strokeStyle='rgba(0,240,255,.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.arc(pos.x,pos.y,rp+5,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
  });
}

function renderParticles(){
  // Shockwaves
  for(let i=shockwaves.length-1;i>=0;i--){const sw=shockwaves[i];sw.r+=sw.spd;sw.a-=.045;if(sw.a<=0){shockwaves.splice(i,1);continue;}ctx.strokeStyle=`rgba(0,240,255,${(sw.a*.65).toFixed(2)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ctx.stroke();}
  // Sparks — update
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.14;p.vx*=.98;p.a*=p.life;p.r*=.968;if(p.a<.022||p.r<.35){particles.splice(i,1);}}
  // Batched fill by color
  const g={};
  particles.forEach(p=>{const k=`${p.col[0]},${p.col[1]},${p.col[2]}`;(g[k]||(g[k]=[])).push(p);});
  Object.entries(g).forEach(([k,ps])=>{ctx.fillStyle=`rgba(${k},.88)`;ctx.beginPath();ps.forEach(p=>{ctx.moveTo(p.x+p.r,p.y);ctx.arc(p.x,p.y,p.r,0,Math.PI*2);});ctx.fill();});
  // Trails
  for(let i=trails.length-1;i>=0;i--){trails[i].a-=.055;if(trails[i].a<=0)trails.splice(i,1);}
  if(trails.length){
    ctx.fillStyle='rgba(0,220,255,.55)';ctx.beginPath();
    trails.forEach(t=>{ctx.moveTo(t.x+t.r,t.y);ctx.arc(t.x,t.y,t.r,0,Math.PI*2);});ctx.fill();
  }
}

function renderHand(){
  if(!smoothLM) return;
  const W=canvas.width, H=canvas.height;
  const th=smoothLM[4], ix=smoothLM[8];
  const dist=Math.hypot(th.x-ix.x,th.y-ix.y);
  const isPinch=dist<GRAB_THRESH;
  const gp={x:(1-(th.x+ix.x)*.5)*W,y:((th.y+ix.y)*.5)*H};

  ctx.save();ctx.scale(-1,1);ctx.translate(-W,0);
  // Glow pass
  ctx.strokeStyle='rgba(0,240,255,.10)';ctx.lineWidth=9;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();HAND_CONN.forEach(([a,b])=>{const la=smoothLM[a],lb=smoothLM[b];ctx.moveTo(la.x*W,la.y*H);ctx.lineTo(lb.x*W,lb.y*H);});ctx.stroke();
  // Sharp pass
  ctx.strokeStyle='rgba(0,240,255,.85)';ctx.lineWidth=1.8;
  ctx.beginPath();HAND_CONN.forEach(([a,b])=>{const la=smoothLM[a],lb=smoothLM[b];ctx.moveTo(la.x*W,la.y*H);ctx.lineTo(lb.x*W,lb.y*H);});ctx.stroke();
  // Joints
  ctx.fillStyle='rgba(0,180,220,.85)';ctx.beginPath();
  smoothLM.forEach((lm,i)=>{if([4,8,12,16,20].includes(i))return;ctx.moveTo(lm.x*W+2.5,lm.y*H);ctx.arc(lm.x*W,lm.y*H,2.5,0,Math.PI*2);});ctx.fill();
  // Tips
  ctx.fillStyle='rgba(0,240,255,1)';ctx.beginPath();
  [4,8,12,16,20].forEach(i=>{const lm=smoothLM[i];ctx.moveTo(lm.x*W+4,lm.y*H);ctx.arc(lm.x*W,lm.y*H,4,0,Math.PI*2);});ctx.fill();
  ctx.restore();

  // Cursor
  if(isPinch){
    ctx.strokeStyle='rgba(0,240,255,.65)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(gp.x,gp.y,18,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(0,240,255,.22)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(gp.x,gp.y,27,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(0,240,255,.15)';
  } else {ctx.fillStyle='rgba(0,200,255,.08)';}
  ctx.beginPath();ctx.arc(gp.x,gp.y,14,0,Math.PI*2);ctx.fill();

  // Rope
  if(grabConstraint){
    const bx=grabConstraint.bodyB.position.x, by=grabConstraint.bodyB.position.y;
    ctx.strokeStyle=canThrow?'rgba(0,255,180,.75)':'rgba(0,240,255,.65)';
    ctx.lineWidth=canThrow?2.5:1.8;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(gp.x,gp.y);ctx.lineTo(bx,by);ctx.stroke();ctx.setLineDash([]);
  }
}

// ═══════════════════════════════════════════════
// GAME LOOP — RAF drives physics manually
// ═══════════════════════════════════════════════
let lastTime=0;
function gameLoop(ts=0){
  requestAnimationFrame(gameLoop);
  const dt=Math.min(ts-lastTime,50); lastTime=ts;
  smoothHand(); handleGrab();
  if(dt>0) Engine.update(engine, dt);
  updateMovingTargets();
  drawBg();
  renderObjects(); renderTargets(); renderParticles(); renderHand();
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
resetBtn.addEventListener('click',()=>{
  ensureAudio();
  ovTitle.style.display='none';spinRing.style.display='block';
  ovMsg.textContent='Get ready…';ovSub.textContent='';
  overlay.classList.remove('hidden');
  setTimeout(()=>{overlay.classList.add('hidden');resetGame();},350);
});

let resizeTO;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTO);
  resizeTO=setTimeout(()=>{
    objects.forEach(b=>World.remove(engine.world,b));
    targets.forEach(b=>World.remove(engine.world,b));
    objects.length=0;targets.length=0;
    Object.keys(spriteCache).forEach(k=>delete spriteCache[k]);
    targetSprite=null;
    canvas.width=gameCont.clientWidth||640;
    canvas.height=gameCont.clientHeight||360;
    initBg();
    if(gameActive){spawnObjects();spawnTargets();}
  },120);
});

['click','touchstart','keydown'].forEach(e=>document.addEventListener(e,ensureAudio,{once:true}));

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.7,minTrackingConfidence:.7});
hands.onResults(onHandResults);

const camera=new Camera(video,{
  onFrame:async()=>{await hands.send({image:video});},
  width:640,height:360
});

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  setup();
  camera.start().then(()=>{
    spinRing.style.display='none';
    ovMsg.textContent='Pinch to grab & throw!';
    ovSub.textContent='Hit the 5 targets before time runs out';
    setTimeout(()=>overlay.classList.add('hidden'),2200);
  }).catch(()=>{
    spinRing.style.display='none';
    ovMsg.textContent='Camera permission needed';
    ovSub.textContent='Allow camera access and refresh the page';
  });
}));
</script>
